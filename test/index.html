<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shaka Player + FastPix monitoring test</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    video {
      width: 100%;
      max-height: 70vh;
      background: #111;
    }
    .hint {
      color: #444;
      font-size: 0.9rem;
    }
    .controls {
      display: flex;
      gap: 0.5rem;
      margin: 1rem 0;
      flex-wrap: wrap;
    }
    .controls input[type="text"] {
      flex: 1 1 320px;
      padding: 0.5rem;
      font-size: 0.95rem;
    }
    .controls button {
      padding: 0.5rem 1rem;
      font-size: 0.95rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Shaka Player + FastPix monitoring</h1>
  <p class="hint">
    Set <code>workspace_id</code> in the script to your FastPix workspace key so events reach the dashboard.
    Playback uses a public sample stream; replace <code>videoUrl</code> with your manifest when testing your own content.
  </p>
  <div class="controls">
    <input
      id="url-input"
      type="text"
      value="https://stream.fastpix.com/82af62f9-64e8-4fe6-b72b-1ccc42d9874e.m3u8"
      placeholder="Enter manifest URL (.m3u8 / .mpd)"
    />
    <button id="load-btn" type="button">Load</button>
    <button id="destroy-btn" type="button">Destroy</button>
  </div>
  <video
    id="video-player"
    controls
    playsinline
    crossorigin="anonymous"
  ></video>

  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.12.7/dist/shaka-player.compiled.js" integrity="sha384-HtIqM8W8H078OnSBEvUzxmni21xyDPh/MwiNFwpwPJLzwvNWrcsAfwndkEvjuh5A" crossorigin="anonymous"></script>
  <script src="../dist/index.js"></script>
  <script>
    (function () {
      var shakaRef = globalThis.shaka;

      // Must match FastPix workspace (see README)
      var playerMetadata = {
        workspace_id: "your-workspace-key",
        player_name: "test-page-player",
        video_title: "Shaka monitoring test",
        video_id: "test-shaka-001",
        viewer_id: "test-viewer",
      };

      var DEFAULT_URL =
        "https://stream.fastpix.com/{Playback_id}.m3u8";

      var currentPlayer = null;

      function tearDown(player) {
        if (player && player.fp && typeof player.fp.destroy === "function") {
          player.fp.destroy();
        }
        if (player && typeof player.destroy === "function") {
          player.destroy();
        }
      }

      function destroyPlayer() {
        if (currentPlayer) {
          tearDown(currentPlayer);
          currentPlayer = null;
          console.log("Player destroyed; FastPix monitoring stopped.");
        }
      }

      function loadPlayer(videoUrl) {
        // Tear down any existing player before creating a new one
        destroyPlayer();

        var videoElement = document.getElementById("video-player");
        if (!videoElement) {
          console.error('Missing #video-player element.');
          return;
        }

        // Capture init time immediately before creating the player (matches README)
        playerMetadata.player_init_time = loadShakaPlayer.utilityMethods.now();

        var player = new shakaRef.Player(videoElement);
        currentPlayer = player;

        var fastPixShakaIntegration = loadShakaPlayer(
          player,
          {
            debug: true,
            data: playerMetadata,
          },
          shakaRef,
        );

        player
          .load(videoUrl)
          .then(function () {
            console.log("Manifest loaded; FastPix monitoring is active for this session.");
          })
          .catch(function (error) {
            if (
              fastPixShakaIntegration &&
              typeof fastPixShakaIntegration.handleLoadError === "function"
            ) {
              fastPixShakaIntegration.handleLoadError(error);
            }
            console.error("Error loading manifest:", error);
          });
      }

      function init() {
        shakaRef.polyfill.installAll();

        if (!shakaRef.Player.isBrowserSupported()) {
          console.error("This browser is not supported by Shaka Player.");
          return;
        }

        var urlInput = document.getElementById("url-input");
        var loadBtn = document.getElementById("load-btn");
        var destroyBtn = document.getElementById("destroy-btn");

        if (urlInput && !urlInput.value) {
          urlInput.value = DEFAULT_URL;
        }

        if (loadBtn) {
          loadBtn.addEventListener("click", function () {
            var url = (urlInput && urlInput.value.trim()) || DEFAULT_URL;
            loadPlayer(url);
          });
        }

        if (destroyBtn) {
          destroyBtn.addEventListener("click", destroyPlayer);
        }

        globalThis.addEventListener("beforeunload", destroyPlayer);

        // Auto-load the default stream on first render
        loadPlayer((urlInput && urlInput.value.trim()) || DEFAULT_URL);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
